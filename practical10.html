<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practical 10 - Iframe Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      text-align: center;
    }

    h1 {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    iframe {
      width: 80%;
      height: 350px;
      border: 2px solid #333;
      margin: 20px 0;
      border-radius: 10px;
    }

    a {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    a:hover {
      background-color: #217dbb;
    }
  </style>
</head>
<body>

  <h1>Practical 10 - HTML Iframe</h1>

  <div class="container">
    <h2>Embedded Google Map</h2>
    <iframe 
      src="https://www.google.com/maps?q=Nagpur&output=embed"
      allowfullscreen=""
      loading="lazy">
    </iframe>

    <h2>Embedded External Webpage</h2>
    <iframe 
      src="https://www.wikipedia.org">
    </iframe>

    <h2>Open Pages in Frame</h2>
    <a href="https://www.example.com" target="myframe">Open Example</a>
    <a href="https://www.wikipedia.org" target="myframe">Open Wikipedia</a>

    <br><br>

    <iframe name="myframe"></iframe>
  </div>

</body>
</html>
